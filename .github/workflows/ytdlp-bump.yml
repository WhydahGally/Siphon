name: Bump yt-dlp

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest yt-dlp version
        id: check
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/yt-dlp/json | jq -r .info.version)
          CURRENT=$(grep -oP 'yt-dlp==\K[^\s"]+' requirements.txt)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update requirements.txt
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          sed -i "s/yt-dlp==${{ steps.check.outputs.current }}/yt-dlp==${{ steps.check.outputs.latest }}/" requirements.txt

      - name: Create Pull Request
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump yt-dlp to ${{ steps.check.outputs.latest }}"
          title: "chore: bump yt-dlp to ${{ steps.check.outputs.latest }}"
          body: |
            Bumps yt-dlp from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.

            [Release notes](https://github.com/yt-dlp/yt-dlp/releases/tag/${{ steps.check.outputs.latest }})
          branch: chore/bump-ytdlp
          base: main
