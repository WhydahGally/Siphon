name: Bump yt-dlp

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check latest yt-dlp version
        id: check
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/yt-dlp/json | jq -r .info.version)
          CURRENT=$(grep -oP 'yt-dlp==\K[^\s"]+' requirements.in)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update requirements.in and regenerate lockfile
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          sed -i "s/yt-dlp==${{ steps.check.outputs.current }}/yt-dlp==${{ steps.check.outputs.latest }}/" requirements.in
          pip install pip-tools
          pip-compile --generate-hashes requirements.in -o requirements.txt

      - name: Create Pull Request
        if: steps.check.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b chore/bump-ytdlp
          git add requirements.in requirements.txt
          git commit -m "chore: bump yt-dlp to ${{ steps.check.outputs.latest }}"
          git push -f origin chore/bump-ytdlp
          gh pr create \
            --base main \
            --title "chore: bump yt-dlp to ${{ steps.check.outputs.latest }}" \
            --body "Bumps yt-dlp from \`${{ steps.check.outputs.current }}\` to \`${{ steps.check.outputs.latest }}\`.

          [Release notes](https://github.com/yt-dlp/yt-dlp/releases/tag/${{ steps.check.outputs.latest }})"

      - name: Trigger e2e tests on bump branch
        if: steps.check.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run e2e-tests.yml --ref chore/bump-ytdlp -f pytest_filter="test_job_reaches_done or test_parallel_downloads_complete"
