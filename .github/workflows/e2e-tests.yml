name: E2E Tests

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  e2e:
    name: pytest (e2e)
    runs-on: ubuntu-latest

    env:
      E2E_PLAYLIST_URL: ${{ secrets.E2E_PLAYLIST_URL }}
      E2E_SINGLE_VIDEO_URL: ${{ secrets.E2E_SINGLE_VIDEO_URL }}
      E2E_MB_USER_AGENT: ${{ secrets.E2E_MB_USER_AGENT }}
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run e2e tests
        id: test_run
        continue-on-error: true
        run: |
          set +e +o pipefail
          pytest tests/e2e/ -v --tb=short --reruns 1 --reruns-delay 5 2>&1 | tee pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Parse results
        id: parse
        run: |
          python3 - <<'EOF'
          import re, os
          try:
              with open("pytest-output.txt") as f:
                  content = f.read()
          except FileNotFoundError:
              content = ""
          summary = ""
          for line in reversed(content.splitlines()):
              if re.search(r'\d+ (passed|failed|skipped|error)', line):
                  summary = line
                  break
          def extract(pattern, text):
              m = re.search(pattern, text)
              return int(m.group(1)) if m else 0
          passed  = extract(r'(\d+) passed',  summary)
          failed  = extract(r'(\d+) failed',  summary)
          skipped = extract(r'(\d+) skipped', summary)
          errors  = extract(r'(\d+) error',   summary)
          total   = passed + failed + skipped + errors
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"skipped={skipped}\n")
              f.write(f"total={total}\n")
          print(f"Parsed: passed={passed}, failed={failed}, skipped={skipped}, total={total}")
          EOF

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed  = parseInt('${{ steps.parse.outputs.passed }}');
            const failed  = parseInt('${{ steps.parse.outputs.failed }}');
            const skipped = parseInt('${{ steps.parse.outputs.skipped }}');
            const total   = parseInt('${{ steps.parse.outputs.total }}');
            const icon   = failed > 0 ? '\u274C' : (passed === 0 && total > 0 ? '\u26A0\uFE0F' : '\u2705');
            const status = failed > 0 ? 'Failing' : (passed === 0 && total > 0 ? 'All Skipped' : 'Passing');
            const runUrl    = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const shortSha  = context.sha.slice(0, 7);
            const marker = '<!-- siphon-e2e-results -->';
            const body = [
              marker,
              `### ${icon} E2E Tests \u2014 ${status}`,
              '',
              '| | |',
              '|:---|---:|',
              `| \u2705 Passed  | ${passed} |`,
              `| \u274C Failed  | ${failed} |`,
              `| \u23ED\uFE0F Skipped | ${skipped} |`,
              `| **Total**  | **${total}** |`,
              '',
              `_Run [#${context.runNumber}](${runUrl}) \u00B7 Commit [\`${shortSha}\`](${commitUrl})_`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Evaluate exit code
        run: |
          FAILED=${{ steps.parse.outputs.failed }}
          PASSED=${{ steps.parse.outputs.passed }}
          TOTAL=${{ steps.parse.outputs.total }}
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed."
            exit 1
          fi
          if [ "$PASSED" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
            echo "::error::All $TOTAL tests were skipped — are the required secrets configured?"
            exit 1
          fi
