name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.next.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          echo "tag=${tag:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          current="${{ steps.latest.outputs.tag }}"
          current="${current#v}"
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Write version to pyproject.toml
        run: |
          version="${{ steps.next.outputs.version }}"
          version="${version#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" pyproject.toml
          git add pyproject.toml
          git commit -m "chore: bump version to ${version}"
          git push origin main
          git fetch origin develop
          git checkout develop
          sed -i "s/^version = \".*\"/version = \"${version}\"/" pyproject.toml
          git add pyproject.toml
          git commit -m "chore: bump version to ${version}"
          git push origin develop
          git checkout main

      - name: Create tag
        run: |
          git tag "${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.version }}
          generate_release_notes: true

  docker:
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      version_tag: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write
