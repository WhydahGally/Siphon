name: Unit Tests

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

permissions:
  pull-requests: write

jobs:
  unit-tests:
    name: pytest (unit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        id: test_run
        continue-on-error: true
        run: |
          set +e +o pipefail
          pytest tests/unit/ -v --tb=short 2>&1 | tee pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Parse results
        id: parse
        run: |
          python3 - <<'EOF'
          import re, os
          try:
              with open("pytest-output.txt") as f:
                  content = f.read()
          except FileNotFoundError:
              content = ""
          summary = ""
          for line in reversed(content.splitlines()):
              if re.search(r'\d+ (passed|failed|skipped|error)', line):
                  summary = line
                  break
          def extract(pattern, text):
              m = re.search(pattern, text)
              return int(m.group(1)) if m else 0
          passed  = extract(r'(\d+) passed',  summary)
          failed  = extract(r'(\d+) failed',  summary)
          skipped = extract(r'(\d+) skipped', summary)
          errors  = extract(r'(\d+) error',   summary)
          total   = passed + failed + skipped + errors
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"skipped={skipped}\n")
              f.write(f"total={total}\n")
          print(f"Parsed: passed={passed}, failed={failed}, skipped={skipped}, total={total}")
          EOF

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed  = parseInt('${{ steps.parse.outputs.passed }}');
            const failed  = parseInt('${{ steps.parse.outputs.failed }}');
            const skipped = parseInt('${{ steps.parse.outputs.skipped }}');
            const total   = parseInt('${{ steps.parse.outputs.total }}');
            let alertType, statusText;
            if (failed > 0) {
              alertType = 'CAUTION'; statusText = 'Failing';
            } else if (passed === 0 && total > 0) {
              alertType = 'CAUTION'; statusText = 'All Skipped';
            } else if (skipped > 0) {
              alertType = 'WARNING'; statusText = 'Passed with skips';
            } else {
              alertType = 'NOTE'; statusText = 'Passing';
            }
            const headSha   = context.payload.pull_request.head.sha;
            const shortSha  = headSha.slice(0, 7);
            const runUrl    = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${headSha}`;
            const marker = '<!-- siphon-unit-results -->';
            const stats  = `${passed} passed \u00B7 ${skipped} skipped \u00B7 ${failed} failed \u00B7 ${total} total`;
            const meta   = `[Run #${context.runNumber}](${runUrl}) \u00B7 [\`${shortSha}\`](${commitUrl})`;
            const body = [
              marker,
              `> [!${alertType}]`,
              `> **Unit Tests \u2014 ${statusText}** &nbsp;\u00B7&nbsp; ${stats} &nbsp;\u00B7&nbsp; ${meta}`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Evaluate exit code
        run: |
          FAILED=${{ steps.parse.outputs.failed }}
          PASSED=${{ steps.parse.outputs.passed }}
          TOTAL=${{ steps.parse.outputs.total }}
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed."
            exit 1
          fi
          if [ "$PASSED" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
            echo "::error::All $TOTAL tests were skipped — no tests ran."
            exit 1
          fi
